services:
  # Local mail catcher for `pnpm dev` — `pnpm mail` starts it, `pnpm mail:stop`
  # stops it. In dev the app sends password resets and invitations here instead
  # of Resend; UI at http://localhost:8025
  #
  # To run the blog itself in Docker, see docker-compose.demo.yml.
  mailpit:
    image: axllent/mailpit
    ports:
      - 8025:8025
      - 1025:1025
    environment:
      MP_MAX_MESSAGES: 5000
      MP_DATABASE: /data/mailpit.db
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    volumes:
      - mailpit_data:/data

volumes:
  mailpit_data:
